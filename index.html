<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">


  <link rel="stylesheet" href="main.css">
  
  <title>Frontend Mentor | Social links profile</title>

</head>
<body>

  <main>
    <div class="profile-container">

      <div class="profile-image">
        <img src="assets/images/avatar-jessica.jpeg" alt="profile-image">
      </div>

      <div class="profile-author">
        <h2 class="profile-name">Jessica Randall</h2>
        <address class="profile-location">London, United Kingdom</address> 
      </div>
      
      <p class="profile-profession">"Front-end developer and avid reader."</p>

     <div class="profile-links">
      <a href="https://github.com" target="_blank" class="profile-link">GitHub</a>
      <a href="https://www.frontendmentor.io" target="_blank" class="profile-link">Frontend Mentor</a>
      <a href="https://www.linkedin.com" target="_blank" class="profile-link">LinkedIn</a>
      <a href="https://www.twitter.com" target="_blank" class="profile-link">Twitter</a>
      <a href="https://www.instagram.com" target="_blank" class="profile-link">Instagram</a>
     </div> 

    </div>
  </main>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/Ismail-SWE">Ismailov K</a>.
  </footer>
</body>
</html>
